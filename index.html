<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover: canvas reaches under iOS notch/home indicator -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Polskie Ptaki</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        background: #1a1a2e;
        overflow: hidden;
        touch-action: none;
        /* Use safe-area insets so nothing hides behind notch */
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
                 env(safe-area-inset-bottom) env(safe-area-inset-left);
      }

      /*
        #game-container is the Phaser parent.
        100dvh = dynamic viewport height — updates when browser chrome hides/shows.
        Fallback to 100vh for older browsers.
      */
      #game-container {
        position: fixed;
        top: 0; left: 0;
        width: 100vw;
        height: 100dvh;
        background: #1a1a2e;
      }

      /* CSS transform centering — works on all Safari versions */
      #game-container canvas {
        display: block;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        touch-action: none;
      }

      /* ── Portrait overlay ─────────────────────────────────────────────── */
      #rotate-msg {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #1a1a2e;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 20px;
        color: #ffe066;
        font-family: "Courier New", monospace;
        text-align: center;
        padding: 24px;
      }
      #rotate-msg .icon { font-size: 64px; animation: tilt 1.8s ease-in-out infinite alternate; }
      #rotate-msg p { font-size: 20px; line-height: 1.5; }
      #rotate-msg .inapp-hint { font-size: 15px; color: #aaa; display: none; line-height: 1.6; }
      #rotate-msg .url-box {
        display: none;
        background: #0d0d1f;
        border: 2px solid #ffe066;
        border-radius: 8px;
        padding: 10px 18px;
        font-size: 17px;
        color: #ffe066;
        letter-spacing: 1px;
      }
      #rotate-msg .copy-btn {
        display: none;
        padding: 14px 28px;
        background: #ffe066;
        color: #1a1a2e;
        font-family: "Courier New", monospace;
        font-size: 17px;
        font-weight: bold;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
      #rotate-msg .copied-msg { display: none; font-size: 15px; color: #88ff88; }
      @keyframes tilt {
        from { transform: rotate(-25deg); }
        to   { transform: rotate(25deg); }
      }
      @media (orientation: portrait) {
        #rotate-msg { display: flex; }
      }
    </style>
  </head>
  <body>
    <div id="rotate-msg">
      <div class="icon">📱</div>
      <p>Obróć telefon poziomo,<br>żeby grać w Polskie Ptaki!</p>
      <p class="inapp-hint" id="inapp-hint">Ta przeglądarka nie obsługuje obrotu ekranu.<br>Skopiuj adres i wklej w Chrome lub Safari:</p>
      <div class="url-box" id="url-box">polskieptaki.pl</div>
      <button class="copy-btn" id="copy-btn">📋 Kopiuj adres</button>
      <span class="copied-msg" id="copied-msg">✓ Skopiowano! Wklej w Chrome lub Safari.</span>
    </div>

    <div id="game-container"></div>

    <script type="module" src="/src/main.js"></script>

    <script>
      // Detect in-app browser (FB, Instagram, LinkedIn, TikTok, Twitter)
      ;(function() {
        var ua = navigator.userAgent || ''
        var isInApp = /FBAN|FBAV|Instagram|LinkedInApp|musical_ly|TikTok|Twitter|Line\/|MicroMessenger/i.test(ua)
        if (!isInApp) return

        document.getElementById('inapp-hint').style.display = 'block'
        document.getElementById('url-box').style.display = 'block'
        document.getElementById('copy-btn').style.display = 'block'

        document.getElementById('copy-btn').addEventListener('click', function() {
          var url = 'https://polskieptaki.pl'
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(showCopied).catch(fallbackCopy)
          } else {
            fallbackCopy()
          }
          function fallbackCopy() {
            var ta = document.createElement('textarea')
            ta.value = url
            ta.style.cssText = 'position:fixed;opacity:0'
            document.body.appendChild(ta)
            ta.focus(); ta.select()
            try { document.execCommand('copy') } catch(e) {}
            document.body.removeChild(ta)
            showCopied()
          }
          function showCopied() {
            document.getElementById('copy-btn').style.display = 'none'
            document.getElementById('copied-msg').style.display = 'block'
          }
        })
      })()

      // Lock to landscape on first interaction (Chrome Android 93+)
      // Fullscreen API avoided — it triggers Phaser resize and crashes the page
      let _lockAttempted = false
      function tryLandscape() {
        if (_lockAttempted) return
        _lockAttempted = true
        try {
          if (screen.orientation && screen.orientation.lock) {
            const p = screen.orientation.lock('landscape')
            if (p && typeof p.catch === 'function') p.catch(() => {})
          }
        } catch (e) {}
      }
      document.addEventListener('touchstart',  tryLandscape, { passive: true })
      document.addEventListener('pointerdown', tryLandscape)
    </script>
  </body>
</html>
